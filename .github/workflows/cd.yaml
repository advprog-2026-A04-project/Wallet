name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  CLOUD_RUN_REGION: us-central1
  CLOUD_RUN_SERVICE: wallet-api
  DB_DRIVER: org.postgresql.Driver

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       (github.event.workflow_run.head_branch == 'main' ||
        github.event.workflow_run.head_branch == 'staging'))
    runs-on: ubuntu-latest
    environment: ${{ github.event.workflow_run.head_branch == 'staging' && 'staging' || 'production' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Deploy to Cloud Run
        env:
          APP_CORS_ALLOWED_ORIGINS: ${{ secrets.APP_CORS_ALLOWED_ORIGINS }}
          CLOUD_SQL_INSTANCE_CONNECTION_NAME: ${{ secrets.CLOUD_SQL_INSTANCE_CONNECTION_NAME }}
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}
        run: |
          trap 'rm -f deploy.env' EXIT
          db_url="${DB_URL:-}"
          if [[ "$db_url" == \?jdbc:* ]]; then
            db_url="${db_url#?}"
          fi

          db_driver="$DB_DRIVER"
          if [[ "$db_url" == *"jdbc:h2:"* ]]; then
            db_driver="org.h2.Driver"
          fi

          {
            printf 'APP_CORS_ALLOWED_ORIGINS=%s\n' "$APP_CORS_ALLOWED_ORIGINS"
            printf 'CLOUD_SQL_INSTANCE_CONNECTION_NAME=%s\n' "$CLOUD_SQL_INSTANCE_CONNECTION_NAME"
            printf 'DB_URL=%s\n' "$db_url"
            printf 'DB_DRIVER=%s\n' "$db_driver"
            printf 'DB_USERNAME=%s\n' "$DB_USERNAME"
            printf 'DB_PASSWORD=%s\n' "$DB_PASSWORD"
            printf 'JWT_SECRET=%s\n' "$JWT_SECRET"
            printf 'INTERNAL_API_TOKEN=%s\n' "$INTERNAL_API_TOKEN"
          } > deploy.env

          cloud_sql_args=()
          if [ -n "${CLOUD_SQL_INSTANCE_CONNECTION_NAME:-}" ]; then
            if [[ "$CLOUD_SQL_INSTANCE_CONNECTION_NAME" =~ ^[a-z][a-z0-9-]{4,28}[a-z0-9]:[a-z0-9-]+:[a-z][a-z0-9-]{0,61}[a-z0-9]$ ]]; then
              cloud_sql_args+=(--add-cloudsql-instances "$CLOUD_SQL_INSTANCE_CONNECTION_NAME")
            else
              echo "::warning::Skipping invalid CLOUD_SQL_INSTANCE_CONNECTION_NAME value."
            fi
          fi

          project_id="${GOOGLE_CLOUD_PROJECT:-${CLOUDSDK_CORE_PROJECT}}"
          gcloud run deploy "$CLOUD_RUN_SERVICE" \
            --source . \
            --project "$project_id" \
            --region "$CLOUD_RUN_REGION" \
            --allow-unauthenticated \
            --max-instances=3 \
            --env-vars-file deploy.env \
            "${cloud_sql_args[@]}"

      - name: Smoke test
        run: |
          project_id="${GOOGLE_CLOUD_PROJECT:-${CLOUDSDK_CORE_PROJECT}}"
          url="$(gcloud run services describe "$CLOUD_RUN_SERVICE" \
            --project "$project_id" \
            --region "$CLOUD_RUN_REGION" \
            --format='value(status.url)')"
          curl --fail --silent --show-error "$url/actuator/health"
