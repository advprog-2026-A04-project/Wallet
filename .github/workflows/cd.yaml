name: Deploy (dummy)

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  contents: read

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' &&  github.event.workflow_run.head_branch == 'staging' }}
    steps:
      - name: Dummy deploy (staging)
        run: echo "Traceback (most recent call last):"
  deploy-prod:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' &&  github.event.workflow_run.head_branch == 'main' }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Install Koyeb CLI
        uses: koyeb-community/koyeb-actions@v2
        with:
          api_token: ${{ secrets.KOYEB_API_TOKEN }}
      - name: Deploy
        uses: koyeb/action-git-deploy@v1
        with:
          service-env: PORT=8000
          service-ports: "8080:http"
          service-routes: "/:8080"
