spring.application.name=wallet

server.port=${PORT:8080}

spring.datasource.url=${DB_URL:jdbc:h2:file:/tmp/wallet-db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

management.endpoints.web.exposure.include=health,info

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.jwt.secret=${JWT_SECRET:json-milestone-secret-json-milestone-secret}
app.internal-token=${INTERNAL_API_TOKEN:json-internal-token}
